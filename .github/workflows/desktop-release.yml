# Desktop plugin builds (VST3 + CLAP, + LV2) for Linux / Windows / macOS, via
# DISTRHO's official dpf-makefile-action. Triggered on a pushed tag (v*): the
# built archives are attached to that tag's GitHub release.
#
# MOD Dwarf and Patchstorage builds are NOT here — they need their own Docker
# toolchains and stay in `make dwarf` / `make patchstorage` locally. `make
# release` creates the release with those local artifacts; this workflow then
# appends the desktop builds to the same release.
#
# macOS is shipped UNSIGNED (users right-click -> Open past Gatekeeper).
name: desktop-release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}   # manual runs (builds only; nothing to attach without a tag)

# The release job attaches the built VST3/CLAP to the GitHub release via
# softprops/action-gh-release, which needs write access to repo contents. The
# repo's default GITHUB_TOKEN is read-only, so grant it explicitly here —
# scoped to this workflow (least privilege), not the whole repo.
permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux desktop — build inside an ubuntu:20.04 container for a glibc-2.31
          # floor (runs on Ubuntu 20.04+/Debian 11+), matching DISTRHO's own CI.
          - { target: linux-x86_64,    os: ubuntu-latest, container: 'ubuntu:20.04' }
          # Windows — cross-compiled from Linux (MinGW); no Windows runner needed.
          - { target: win64,           os: ubuntu-24.04 }
          # macOS — universal (arm64 + x86_64) on an Apple-Silicon runner.
          - { target: macos-universal, os: macos-14 }
    runs-on: ${{ matrix.os }}
    container: ${{ matrix.container }}
    steps:
      # The ubuntu:20.04 container ships without git, so actions/checkout falls
      # back to a git-less REST download that can't fetch submodules ("Input
      # 'submodules' not supported ... add Git 2.18 or higher"). Install git
      # first. Skipped on the non-container win64/macOS runners (already have it).
      - name: Install git in container (for submodule checkout)
        if: matrix.container != ''
        run: |
          apt-get update
          apt-get install -y --no-install-recommends git ca-certificates
      - uses: actions/checkout@v4
        with:
          submodules: recursive   # dpf is a submodule — required to build
      - uses: distrho/dpf-makefile-action@v1
        with:
          target: ${{ matrix.target }}
          # Build only the desktop plugin formats (lv2 vst3 clap) via the inner
          # DPF Makefile: DESKTOP_ONLY=1 makes the top-level `all` skip this
          # repo's MOD-specific ttl/modgui steps (GNU-sed, modgui assets), which
          # would break the macOS build and mean nothing for a desktop release.
          # Identical across all template-derived repos.
          extraargs: DESKTOP_ONLY=1
          release: ${{ startsWith(github.ref, 'refs/tags/') }}
